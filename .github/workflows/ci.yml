name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    env:
      # Avoid runner- or organization-level npm cache paths leaking across jobs,
      # especially the unstable shared C:\npm\cache path on Windows runners.
      npm_config_cache: ${{ runner.temp }}/npm-cache
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [18.x, 20.x, 22.x]
        exclude:
          - os: macos-latest
            node-version: 18.x
          - os: windows-latest
            node-version: 18.x

    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        # CI may inherit NODE_ENV=production or npm omit=dev from repository/org settings.
        # Retry once with a clean cache for npm's intermittent "Exit handler never called" bug.
        shell: bash
        run: npm ci --include=dev || { npm cache clean --force && npm ci --include=dev; }

      - name: Lint
        run: npm run lint:check

      - name: Format check
        run: npm run format:check

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test:coverage

      - name: Smoke test
        run: npm run smoke
