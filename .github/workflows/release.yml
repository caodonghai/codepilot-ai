name: Release

permissions:
  contents: write
  id-token: write

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: development

    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Set up pnpm
        uses: pnpm/action-setup@d15e628ca66d93ee5f352c71671a7bc6a97af5c9 # v6.0.8
        with:
          version: 7.33.7

      - name: Use Node.js 20.x
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20.x'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify tag matches package version
        run: test "$GITHUB_REF_NAME" = "v$(node -p 'require(\"./package.json\").version')"

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm run test:coverage

      - name: Smoke test
        run: pnpm run smoke

      - name: Build release archive and SBOM
        run: |
          npm pack
          npm sbom --sbom-format cyclonedx > sbom.cdx.json

      - name: Publish package
        run: npm publish codepilot-ai-*.tgz --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release
        run: gh release create "$GITHUB_REF_NAME" codepilot-ai-*.tgz sbom.cdx.json --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
